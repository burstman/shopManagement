services:
  - type: web
    name: shop-dashboard
    env: go
    buildCommand: go build -o bin/dashboard ./cmd/app/
    startCommand: ./bin/dashboard
    healthCheckPath: /healthz
    envVars:
      - key: SUPERKIT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shop-db
          property: connectionString
      - key: DB_DRIVER
        value: postgres

databases:
  - name: shop-db
    plan: free
    databaseName: shopdev001
